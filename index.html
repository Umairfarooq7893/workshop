<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Black Hole</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
    }
    canvas {
        display: block;
    }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let center = { x: canvas.width/2, y: canvas.height/2 };

window.addEventListener("mousemove", e => {
    center.x = e.clientX;
    center.y = e.clientY;
});

class Particle {
    constructor() {
        this.reset();
    }

    reset() {
        this.angle = Math.random() * Math.PI * 2;
        this.radius = Math.random() * 400 + 80;
        this.speed = 0.002 + Math.random() * 0.01;
        this.size = Math.random() * 2 + 0.5;
        this.depth = Math.random(); // for 3D feel
    }

    update() {
        this.angle += this.speed * (1 + this.depth * 2);

        // Spiral inward
        this.radius *= 0.994 - this.depth * 0.002;

        if (this.radius < 25) this.reset();
    }

    draw() {
        let x = center.x + Math.cos(this.angle) * this.radius;
        let y = center.y + Math.sin(this.angle) * this.radius;

        // Glow based on distance
        let glow = 255 - this.radius * 0.5;
        ctx.fillStyle = `rgba(${glow}, ${glow*0.6}, 255, 0.8)`;

        ctx.beginPath();
        ctx.arc(x, y, this.size, 0, Math.PI*2);
        ctx.fill();
    }
}

let particles = Array.from({length: 1200}, () => new Particle());

function drawAccretionDisk() {
    let grad = ctx.createRadialGradient(
        center.x, center.y, 20,
        center.x, center.y, 200
    );

    grad.addColorStop(0, "rgba(0,0,0,1)");
    grad.addColorStop(0.2, "rgba(80,0,120,0.8)");
    grad.addColorStop(0.5, "rgba(0,150,255,0.3)");
    grad.addColorStop(1, "rgba(0,0,0,0)");

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(center.x, center.y, 200, 0, Math.PI*2);
    ctx.fill();
}

function drawLensing() {
    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    for (let i = 0; i < 360; i += 5) {
        let r = 60;
        let angle = i * Math.PI / 180;

        let x = center.x + Math.cos(angle) * r;
        let y = center.y + Math.sin(angle) * r;

        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(
            x + Math.cos(angle) * 10,
            y + Math.sin(angle) * 10
        );
        ctx.stroke();
    }
}

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawAccretionDisk();

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    drawLensing();

    // Black core
    ctx.beginPath();
    ctx.arc(center.x, center.y, 25, 0, Math.PI*2);
    ctx.fillStyle = "black";
    ctx.fill();

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
});
</script>

</body>
</html>
